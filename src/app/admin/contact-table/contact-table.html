<div class="table-header">
  <h2>Contact Form Data</h2>

  <button class="btn-export" (click)="exportExcel()">
    <i class="fas fa-file-excel"></i>
    Export Excel
  </button>
</div>

<!-- LOADING -->

<div class="loading-box" *ngIf="loading">Loading contact data...</div>

<!-- TABLE -->

<div class="table-responsive" *ngIf="!loading && contacts.length > 0">
  <table class="table table-bordered table-hover align-middle">
    <thead>
      <tr>
        <th>S.No</th>

        <th>Name</th>

        <th>Email</th>

        <th>Phone</th>

        <th>Grade</th>

        <th>Message</th>

        <th>Submitted Date</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of contacts; let i = index">
        <td>{{ i + 1 }}</td>

        <td>
          <div class="user-name">
            {{ item.name }}
          </div>
        </td>

        <td>{{ item.email }}</td>

        <td>{{ item.phone }}</td>

        <td>
          <span class="badge-grade">
            {{ item.grade }}
          </span>
        </td>

        <td class="message-cell">
          {{ item.message }}
        </td>

        <td>
          {{ item.createdAt | date: 'medium' }}
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- EMPTY -->

<div class="empty-box" *ngIf="!loading && contacts.length === 0">
  <i class="fas fa-folder-open"></i>

  <p>No contact form records found</p>
</div>
